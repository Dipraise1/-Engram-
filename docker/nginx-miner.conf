# Engram Miner — nginx TLS Termination
#
# Terminates HTTPS from validators / SDK clients and forwards to the miner's
# plain HTTP port (8091) on localhost. Keeps the miner process simple while
# encrypting all traffic in transit — including namespace_key fields.
#
# Deploy:
#   1. Install nginx + certbot
#   2. Replace YOUR_DOMAIN with your miner's public hostname
#   3. Run: certbot --nginx -d YOUR_DOMAIN
#   4. Restart nginx
#
# After TLS is up, set MINER_PORT=8091 and let nginx handle 443.

events {
    worker_connections 1024;
}

http {
    # ── Rate limiting at the proxy layer (before it hits Python) ─────────────
    # Keyed by $binary_remote_addr — hard cap regardless of hotkey claims.
    limit_req_zone $binary_remote_addr zone=miner_zone:10m rate=60r/m;
    limit_req_status 429;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format engram '$remote_addr - [$time_local] "$request" $status '
                      '$body_bytes_sent "$http_user_agent" $request_time';
    access_log /var/log/nginx/engram_access.log engram;
    error_log  /var/log/nginx/engram_error.log warn;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS termination ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN;

        # Managed by certbot:
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS (1 year) — only set once you're confident TLS is stable
        # add_header Strict-Transport-Security "max-age=31536000" always;

        # ── Body size limit ───────────────────────────────────────────────────
        # Match MINER_MAX_BODY_BYTES (default 10 MB)
        client_max_body_size 10m;

        # ── Public endpoints ──────────────────────────────────────────────────
        location ~ ^/(IngestSynapse|QuerySynapse|ChallengeSynapse|health)$ {
            limit_req zone=miner_zone burst=20 nodelay;

            proxy_pass         http://127.0.0.1:8091;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Block all other paths ─────────────────────────────────────────────
        # /metrics, /namespace, /wallet-stats are localhost-only in the miner
        # code — block them at the proxy too for defence-in-depth.
        location / {
            return 403 '{"error":"Not exposed"}';
            add_header Content-Type application/json;
        }
    }
}
